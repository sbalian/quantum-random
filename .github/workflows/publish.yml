name: Publish

on:
  push:
    tags:
      - '*'

jobs:
  release:
    permissions:
      id-token: write
    name: Release
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.4"
      - name: Build
        run: uv build
      - name: Publish
        run: uv publish
      - name: Sleep
        run: sleep 30s
        shell: bash
      - name: Test import
        run: uv run --with quantum-random --no-project -- python -c "import qrandom"
