name: Publish

on:
  push:
    tags:
      - "*"

jobs:
  release:
    permissions:
      id-token: write
    name: Release
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.10"
      - name: Build
        run: uv build
      - name: Publish
        run: uv publish
      - name: Sleep
        run: sleep 30s
        shell: bash
      - name: Test import
        run: QRANDOM_API_KEY=key uv run --with quantum-random --no-project -- python -c "import qrandom"
